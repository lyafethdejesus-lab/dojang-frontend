// ─── UTILIDADES ───────────────────────────────────────────────────────────────
let _seq = 0;
const uid = (p) => `${p}${Date.now()}${_seq++}`;
const genStudentId = (name, existingIds=[]) => {
  const year = new Date().getFullYear();
  const parts = name.trim().toUpperCase().split(/\s+/).filter(Boolean);
  const initials = parts.length >= 2
    ? parts[0][0] + parts[parts.length-1][0]
    : (parts[0]||"XX").slice(0,2);
  const base = `AT-${year}${initials}`;
  const taken = existingIds.filter(id=>id.startsWith(base)).map(id=>parseInt(id.slice(-3))||0);
  const next = taken.length ? Math.max(...taken)+1 : 1;
  return `${base}${String(next).padStart(3,"0")}`;
};
const todayStr = () => new Date().toISOString().split("T")[0];
const parseDate = (s) => new Date(s + "T12:00:00");
const fmtDate = (d) => {
  if(!d) return "—";
  const [y,m,day] = d.split("-");
  return `${parseInt(day)} ${["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"][+m-1]} ${y}`;
};
const mxn = (n) => `$${Number(n).toLocaleString("es-MX")}`;
function monthsBetween(d1,d2){const a=parseDate(d1),b=parseDate(d2);return(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())}
function addMonths(dateStr,n){const d=parseDate(dateStr);d.setMonth(d.getMonth()+n);return d.toISOString().split("T")[0]}
function daysUntil(dateStr){const t=parseDate(todayStr()),tgt=parseDate(dateStr);return Math.round((tgt-t)/(1000*60*60*24))}

// ─── TOAST ────────────────────────────────────────────────────────────────────
const Toast = ({msg,onDone}) => {
  const [exiting,setExiting] = useState(false);
  useEffect(()=>{
    const t1 = setTimeout(()=>setExiting(true),2200);
    const t2 = setTimeout(()=>onDone(),2600);
    return ()=>{clearTimeout(t1);clearTimeout(t2)};
  },[]);
  return <div className={`toast ${exiting?"toast-exit":""}`}>✓ {msg}</div>;
};

// ─── API REAL (conectada a backend) ───────────────────────────────────────────
const API_URL = "https://dojang-backend.onrender.com";
let _token = null;

async function apiFetch(path, options={}) {
  const headers = {"Content-Type":"application/json"};
  if(_token) headers["Authorization"] = `Bearer ${_token}`;
  const res = await fetch(API_URL + path, {...options, headers});
  return res.json();
}

function createApi(db, setDb) {
  const mutate = (fn) => setDb(prev => ({...prev,...fn(prev)}));
  return {
    // ── LOGIN (usa API real) ──
    login: async (user, pass) => {
      try {
        const data = await apiFetch("/api/auth/login", {
          method:"POST",
          body: JSON.stringify({username:user, password:pass})
        });
        if(data.token) {
          _token = data.token;
          return {role: data.rol === "admin" ? "admin" : data.rol, name: user};
        }
        return null;
      } catch(e) { return null; }
    },
    // ── ALUMNOS (API real) ──
    getStudents: () => db.students,
    getStudent: (id) => db.students.find(s=>s.id===id),
    addStudent: async (d) => {
      try {
        await apiFetch("/api/alumnos", {method:"POST", body: JSON.stringify({
          num_control: uid("s"),
          nombre: d.name,
          fecha_nacimiento: d.dob || "2000-01-01",
          id_cinta_actual: 1,
          num_control_responsable: d.parentId || "resp_default"
        })});
      } catch(e) {}
      mutate(db=>({students:[...db.students,{...d,id:uid("s"),personal:d.personal||{address:"",blood:"",emergency:"",emergencyPhone:"",medNotes:""}}]}));
    },
    updateStudent:(id,d)=>mutate(db=>({students:db.students.map(s=>s.id===id?{...s,...d}:s)})),
    updateStudentPersonal:(id,personal)=>mutate(db=>({students:db.students.map(s=>s.id===id?{...s,personal:{...s.personal,...personal}}:s)})),
    deleteStudent:(id)=>mutate(db=>({students:db.students.filter(s=>s.id!==id)})),
    // ── PAGOS (API real) ──
    getPayments: () => db.payments,
    getStudentPayments:(sid)=>db.payments.filter(p=>p.sid===sid),
    addPayment: async (d) => {
      try {
        await apiFetch("/api/pagos", {method:"POST", body: JSON.stringify({
          monto_total: d.total,
          monto_abonado: d.paid || 0,
          tipo_pago: d.concept,
          metodo_pago: d.installments > 1 ? "A plazos" : "Contado",
          estado_pago: "Pendiente",
          num_control_responsable: d.sid
        })});
      } catch(e) {}
      mutate(db=>({payments:[...db.payments,{...d,id:uid("p")}]}));
    },
    updatePayment:(id,d)=>mutate(db=>({payments:db.payments.map(p=>p.id===id?{...p,...d}:p)})),
    deletePayment:(id)=>mutate(db=>({payments:db.payments.filter(p=>p.id!==id)})),
    registerInstallment: async (id) => {
      try { await apiFetch(`/api/pagos/${id}/abonar`, {method:"PUT", body: JSON.stringify({abono: db.payments.find(p=>p.id===id)?.instAmt || 0})}); } catch(e) {}
      mutate(db=>({
        payments:db.payments.map(p=>{
          if(p.id!==id) return p;
          const ni=p.instPaid+1,np=p.paid+p.instAmt,done=ni>=p.installments;
          return{...p,instPaid:ni,paid:np,status:done?"liquidado":"en_proceso",nextDue:done?null:p.nextDue};
        })
      }));
    },
    // ── EVENTOS (solo local por ahora) ──
    getAdmin:()=>db.admin,
    updateAdmin:(d)=>mutate(db=>({admin:{...db.admin,...d}})),
    getEvents:()=>db.events.slice().sort((a,b)=>a.date.localeCompare(b.date)),
    addEvent:(d)=>mutate(db=>({events:[...db.events,{...d,id:uid("e")}]})),
    updateEvent:(id,d)=>mutate(db=>({events:db.events.map(e=>e.id===id?{...e,...d}:e)})),
    deleteEvent:(id)=>mutate(db=>({events:db.events.filter(e=>e.id!==id)})),
    // ── EXÁMENES (API real) ──
    getAllExams: async () => {
      try {
        const data = await apiFetch("/api/examenes");
        return data.map(x => ({
          id: String(x.id_examen),
          sid: x.num_control_alumno,
          date: x.fecha,
          belt: x.cinta_aspirada_color || "Blanco",
          result: x.resultado === "Aprobado" ? "pass" : x.resultado === "Reprobado" ? "fail" : "pending",
          notes: x.observaciones || ""
        }));
      } catch(e) { return db.exams; }
    },
    getStudentExams:(sid)=>db.exams.filter(x=>x.sid===sid).slice().sort((a,b)=>a.date.localeCompare(b.date)),
    addExam: async (d) => {
      try {
        await apiFetch("/api/examenes", {method:"POST", body: JSON.stringify({
          fecha: d.date,
          observaciones: d.notes,
          resultado: d.result === "pass" ? "Aprobado" : d.result === "fail" ? "Reprobado" : "Pendiente",
          num_control_alumno: d.sid,
          id_cinta_aspirada: 1
        })});
      } catch(e) {}
      mutate(db=>({exams:[...db.exams,{...d,id:uid("x")}]}));
    },
    updateExam:(id,d)=>mutate(db=>({exams:db.exams.map(x=>x.id===id?{...x,...d}:x)})),
    deleteExam:(id)=>mutate(db=>({exams:db.exams.filter(x=>x.id!==id)})),
    getNextExamDate:(sid)=>{
      const xs=db.exams.filter(x=>x.sid===sid).slice().sort((a,b)=>b.date.localeCompare(a.date));
      const s=db.students.find(s=>s.id===sid);
      return addMonths(xs.length>0?xs[0].date:(s?.joined||todayStr()),EXAM_MONTHS);
    },
    // ── INVENTARIO (API real) ──
    getInventory: () => db.inventory,
    updateInventoryItem:(itemId,data)=>mutate(db=>({inventory:{...db.inventory,[itemId]:{...db.inventory[itemId],...data}}})),
    adjustStock: async (itemId, delta) => {
      mutate(db=>{
        const cur=db.inventory[itemId]||{qty:0,minStock:2};
        return{inventory:{...db.inventory,[itemId]:{...cur,qty:Math.max(0,cur.qty+delta)}}};
      });
    },
  };
}

                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:1,color:"#f0f0fa"}}>Examen #{i+1}</span>
                    {exam.passed?<span className="tag" style={{background:"rgba(74,222,128,.15)",color:"#4ade80",border:"1px solid rgba(74,222,128,.3)"}}>✓ Aprobado</span>:<span className="tag" style={{background:"rgba(239,68,68,.15)",color:"#f87171",border:"1px solid rgba(239,68,68,.3)"}}>✗ No aprobado</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <BeltBadge belt={exam.fromBelt}/><span style={{color:"#555577",fontSize:12}}>→</span><BeltBadge belt={exam.toBelt}/>

  const empty = {sid:sid||"",date:todayStr(),fromBelt:"Blanco",toBelt:"Amarillo",passed:true,notes:""};

  const set = (k,v)=>setF(p=>({...p,[k]:v}));

      <div className="form-row form-row-2">

// ─── INVENTARIO ADMIN ─────────────────────────────────────────────────────────
const AdminInventory = ({api,onToast}) => {
  const inv = api.getInventory();
  const [openCats,setOpenCats] = useState({"uniformes":true,"cintas":false,"distintivos":false,"protectores":true});
  const [editItem,setEditItem] = useState(null);
  const toggle = (id)=>setOpenCats(p=>({...p,[id]:!p[id]}));

  const totalItems = INV_CATEGORIES.reduce((a,c)=>a+c.items.length,0);
  const lowStock = INV_CATEGORIES.reduce((a,c)=>a+c.items.filter(it=>{const d=inv[it.id];return d&&d.qty>0&&d.qty<=d.minStock;}).length,0);
  const outStock = INV_CATEGORIES.reduce((a,c)=>a+c.items.filter(it=>{const d=inv[it.id];return d&&d.qty===0;}).length,0);

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div className="section-title">INVENTARIO</div>
        <div style={{fontSize:12,color:"#555577"}}>Actualización en tiempo real</div>
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        {[
          {label:"Total artículos",val:totalItems,color:"#dde0ee"},
          {label:"En stock",val:totalItems-lowStock-outStock,color:"#4ade80"},
          {label:"Stock bajo",val:lowStock,color:"#d4960f"},
          {label:"Sin stock",val:outStock,color:"#f87171"},
        ].map(s=>(
          <div key={s.label} className="stat-card">
            <div className="stat-value" style={{color:s.color}}>{s.val}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>

      {outStock>0&&(
        <div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.3)",borderRadius:10,padding:"12px 18px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
          <Icon name="warning" size={18}/><span style={{color:"#f87171",fontSize:13,fontWeight:600}}>{outStock} artículo{outStock!==1?"s":""} sin stock — revisa tu inventario</span>
        </div>
      )}

      {/* Categorías */}
      {INV_CATEGORIES.map(cat=>{
        const catLow = cat.items.filter(it=>{const d=inv[it.id];return d&&d.qty>0&&d.qty<=d.minStock;}).length;
        const catOut = cat.items.filter(it=>{const d=inv[it.id];return !d||d.qty===0;}).length;
        return(
          <div key={cat.id} style={{marginBottom:12}}>
            <div className="inv-category-header" onClick={()=>toggle(cat.id)}>
              <span style={{fontSize:20}}>{cat.icon}</span>
              <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:17,letterSpacing:1,color:"#f0f0fa",flex:1}}>{cat.label}</span>
              {catOut>0&&<span className="tag stock-out">{catOut} sin stock</span>}
              {catLow>0&&<span className="tag stock-low" style={{marginLeft:6}}>{catLow} bajo</span>}
              <span style={{color:"#555577",marginLeft:8,transition:"transform .2s",display:"block",transform:openCats[cat.id]?"rotate(180deg)":"rotate(0)"}}><Icon name="chevronDown" size={16}/></span>
            </div>
            {openCats[cat.id]&&(
              <div className="card" style={{marginTop:4}}>
                {cat.items.map(item=>{
                  const d = inv[item.id]||{qty:0,minStock:2};
                  const stockClass = d.qty===0?"stock-out":d.qty<=d.minStock?"stock-low":"stock-ok";
                  return(
                    <div key={item.id} className="inv-item-row">
                      <div>
                        <div style={{color:"#dde0ee",fontSize:13,fontWeight:500}}>{item.name}</div>
                        <div style={{fontSize:11,color:"#555577",marginTop:2}}>Mín. recomendado: {d.minStock} unid.</div>
                      </div>
                      <div className="number-input-wrapper">
                        <button className="qty-btn" onClick={()=>{api.adjustStock(item.id,-1);onToast(`${item.name} actualizado`);}}>−</button>
                        <div className="qty-display">{d.qty}</div>
                        <button className="qty-btn" onClick={()=>{api.adjustStock(item.id,1);onToast(`${item.name} actualizado`);}}>+</button>
                      </div>
                      <span className={`stock-badge ${stockClass}`}>{d.qty===0?"SIN STOCK":d.qty<=d.minStock?"STOCK BAJO":"EN STOCK"}</span>
                      <button className="tk-btn btn-ghost btn-sm" onClick={()=>setEditItem({item,d})} title="Editar mínimo"><Icon name="settings" size={13}/></button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}

      {/* Edit min stock modal */}
      {editItem&&(
        <Modal title={`AJUSTAR — ${editItem.item.name}`} onClose={()=>setEditItem(null)}>
          <EditStockModal item={editItem.item} data={editItem.d} api={api} onToast={onToast} onClose={()=>setEditItem(null)}/>
        </Modal>
      )}
    </div>
  );
};

const EditStockModal = ({item,data,api,onToast,onClose}) => {
  const [qty,setQty] = useState(data.qty);
  const [min,setMin] = useState(data.minStock);
  const save = ()=>{api.updateInventoryItem(item.id,{qty:+qty,minStock:+min});onToast("Inventario actualizado");onClose();};
  return(
    <div>
      <div className="form-row form-row-2">
        <div><label className="tk-label">Cantidad actual</label><input className="tk-input" type="number" min="0" value={qty} onChange={e=>setQty(e.target.value)}/></div>
        <div><label className="tk-label">Stock mínimo</label><input className="tk-input" type="number" min="0" value={min} onChange={e=>setMin(e.target.value)}/></div>
      </div>
      <div className="form-actions">
        <button className="tk-btn btn-ghost" onClick={onClose}>Cancelar</button>
        <button className="tk-btn btn-red" onClick={save}>Guardar</button>
      </div>
    </div>
  );
};

const LoginPage = ({onLogin}) => {

  const triggerShake = () => {

  const handleIdSubmit = (e) => {

            const done = step > s;

                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <div style={{width:46,height:46,borderRadius:"50%",background:`${roleColor}20`,border:`2px solid ${roleColor}60`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>

                  <div style={{flex:1}}>

// ─── PORTAL ALUMNO ────────────────────────────────────────────────────────────
const StudentPersonalEdit = ({student,api,onToast,onClose}) => {
  const [f,setF]=useState({...student.personal||{address:"",blood:"",emergency:"",emergencyPhone:"",medNotes:""}});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=()=>{api.updateStudentPersonal(student.id,f);onToast("Datos actualizados");onClose();};
  return(
    <div>
      <div className="form-row form-row-2">
        <div><label className="tk-label">Dirección</label><input className="tk-input" value={f.address} onChange={e=>set("address",e.target.value)}/></div>
        <div><label className="tk-label">Tipo de sangre</label><select className="tk-input" value={f.blood} onChange={e=>set("blood",e.target.value)}><option value="">— Seleccionar —</option>{["A+","A-","B+","B-","AB+","AB-","O+","O-"].map(t=><option key={t}>{t}</option>)}</select></div>
      </div>
      <div className="form-row form-row-2">
        <div><label className="tk-label">Contacto de emergencia</label><input className="tk-input" value={f.emergency} onChange={e=>set("emergency",e.target.value)}/></div>
        <div><label className="tk-label">Teléfono emergencia</label><input className="tk-input" value={f.emergencyPhone} onChange={e=>set("emergencyPhone",e.target.value)}/></div>
      </div>
      <div className="form-row"><div><label className="tk-label">Notas médicas / condiciones</label><textarea className="tk-input" rows={3} value={f.medNotes} onChange={e=>set("medNotes",e.target.value)} placeholder="Ej. Asma leve, ninguna condición..."/></div></div>
      <div style={{padding:"12px 16px",background:"rgba(255,255,255,.03)",borderRadius:8,border:"1px solid #1e1e2e",fontSize:12,color:"#7070a0",marginTop:8}}>
        ℹ️ Solo puedes editar tus datos personales y de emergencia. Para cambios de nombre, cinturón o contraseña, contacta al maestro.
      </div>
      <div className="form-actions">
        <button className="tk-btn btn-ghost" onClick={onClose}>Cancelar</button>
        <button className="tk-btn btn-red" onClick={save}>Guardar cambios</button>
      </div>
    </div>
  );
};

const StudentPortal = ({session,api,onLogout}) => {

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [db,setDb]=useState(INIT_DB);
  const [session,setSession]=useState(null);
  const [loading,setLoading]=useState(false);
  const api=createApi(db,setDb);

  const loadApiData = async (tok) => {
    try {
      const h = {"Content-Type":"application/json","Authorization":`Bearer ${tok}`};
      const fetchJ = (url) => fetch(API_URL+url,{headers:h}).then(r=>r.json());
      const [students, payments, exams] = await Promise.all([
        fetchJ("/api/alumnos"),
        fetchJ("/api/pagos"),
        fetchJ("/api/examenes"),
      ]);
      const mappedStudents = Array.isArray(students) ? students.map(a => ({
        id: a.num_control, name: a.nombre,
        age: a.fecha_nacimiento ? Math.floor((new Date()-new Date(a.fecha_nacimiento))/(365.25*24*60*60*1000)) : 0,
        belt: a.cinta_color||"Blanco", parent: a.responsable_nombre||"",
        phone:"", email:"", joined: a.fecha_ingreso||todayStr(), active:true,
        user: a.num_control, pass:"1234",
        personal:{address:"",blood:"",emergency:"",emergencyPhone:"",medNotes:""}
      })) : [];
      const mappedPayments = Array.isArray(payments) ? payments.map(p => ({
        id: String(p.id_pago), sid: p.num_control_responsable,
        concept: p.tipo_pago||"Pago", total: parseFloat(p.monto_total)||0,
        paid: parseFloat(p.monto_abonado)||0,
        installments: p.metodo_pago==="A plazos"?4:1,
        instPaid: p.estado_pago==="Liquidado"?1:0,
        instAmt: parseFloat(p.monto_total)||0, start: p.fecha_pago||todayStr(),
        nextDue:null, status: p.estado_pago==="Liquidado"?"liquidado":p.estado_pago==="Vencido"?"vencido":"en_proceso", notes:""
      })) : [];
      const mappedExams = Array.isArray(exams) ? exams.map(x => ({
        id: String(x.id_examen), sid: x.num_control_alumno,
        date: x.fecha||todayStr(), fromBelt:"Blanco",
        toBelt: x.cinta_aspirada_color||"Amarillo",
        passed: x.resultado==="Aprobado", notes: x.observaciones||""
      })) : [];
      setDb(prev=>({...prev,
        students: mappedStudents.length>0?mappedStudents:prev.students,
        payments: mappedPayments.length>0?mappedPayments:prev.payments,
        exams: mappedExams.length>0?mappedExams:prev.exams,
      }));
    } catch(e){ console.log("Usando datos locales:",e); }
  };

  const handleLogin=useCallback(async (user,pass)=>{
    setLoading(true);
    const result=await api.login(user,pass);
    if(result){ await loadApiData(_token); setSession(result); }
    setLoading(false);
    return result;
  },[db]);

  if(loading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0b0b12",flexDirection:"column",gap:16}}>
      <div style={{fontSize:40}}>🥋</div>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:3,color:"#c01212"}}>CARGANDO...</div>
      <div style={{color:"#555577",fontSize:13}}>Conectando con el servidor...</div>
    </div>
  );
  if(!session) return <LoginPage onLogin={handleLogin}/>;
  if(session.role==="admin") return <AdminLayout session={session} api={api} onLogout={()=>setSession(null)}/>;
  return <StudentPortal session={session} api={api} onLogout={()=>setSession(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
